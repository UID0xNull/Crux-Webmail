# ============================================================================
# Redis Configuration — Crux-Webmail Enterprise
# ============================================================================
# Security-hardened Redis config for Docker (read_only fs + tmpfs)
# ============================================================================

bind 0.0.0.0
port 6379
protected-mode yes
daemonize no
pidfile /data/redis.pid

# Logging
loglevel notice
logfile ""

# Memory limits (aligns with 512M Docker limit)
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence (RDB only, fits read_only + tmpfs)
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb
dir /data

# Security
# NOTE: Redis does not support file-based secrets natively.
# Replace with actual password or use entrypoint to read /run/secrets/redis_password
requirepass CHANGE_ME_REDIS_PASSWORD

# Performance
tcp-backlog 511
timeout 300
tcp-keepalive 300
hz 10
dynamic-hz yes

# Disable dangerous commands
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
rename-command CONFIG ""