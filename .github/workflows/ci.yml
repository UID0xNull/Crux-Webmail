name: CI — Crux-Webmail

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  POSTGRES_USER: crux_test
  POSTGRES_PASSWORD: testpassword123
  POSTGRES_DB: crux_test_db
  REDIS_URL: redis://localhost:6379

jobs:
  # ----------------------------------------------------------------
  # 1. Lint & TypeCheck — rápido, falla temprano
  # ----------------------------------------------------------------
  lint-typecheck:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeCheck (full project)
        run: npm run typecheck

      - name: TypeCheck (tests)
        run: npm run typecheck:tests

  # ----------------------------------------------------------------
  # 2. Unit Tests
  # ----------------------------------------------------------------
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm run test:unit
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-unit-c48d5c5c
          ENCRYPTION_KEY: test-enc-key-unit-64ch4rs
          SESSION_SECRET: test-session-secret

      - name: Upload coverage to GitHub Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-report
          path: coverage/
          retention-days: 7

  # ----------------------------------------------------------------
  # 3. Integration Tests (con Redis + PostgreSQL en Docker)
  # ----------------------------------------------------------------
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ${{ env.POSTGRES_USER }}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Integration Tests
        run: npm run test:integration
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-int-c48d5c5c
          ENCRYPTION_KEY: test-enc-key-int-64ch4rs
          SESSION_SECRET: test-session-secret
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Upload integration coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage-report
          path: coverage/
          retention-days: 7

  # ----------------------------------------------------------------
  # 4. Security Scan — Secrets, Dependencies, npm audit
  # ----------------------------------------------------------------
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TruffleHog — scan for secrets
        uses: trufflesecurity/trufflehog@v3.88.1
        with:
          extra_args: "--only-verified --fail"

      - name: npm audit — fail on high/critical
        run: |
          npm audit --audit-level=high || {
            echo "::error::Vulnerabilidades de nivel HIGH/CRITICAL detectadas."
            exit 1
          }

  # ----------------------------------------------------------------
  # 5. Docker Build Test — valida Dockerfiles reales
  # ----------------------------------------------------------------
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [lint-typecheck, unit-tests, integration-tests, security-scan]
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/server/Dockerfile
          push: false
          load: true
          tags: crux-server:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/web/Dockerfile
          push: false
          load: true
          tags: crux-web:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container smoke test — server
        run: |
          docker run --rm crux-server:test echo "Server image OK"

      - name: Run container smoke test — web
        run: |
          docker run --rm crux-web:test echo "Web image OK"

  # ----------------------------------------------------------------
  # 6. Branch Protection Gate
  # ----------------------------------------------------------------
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [lint-typecheck, unit-tests, integration-tests, security-scan, docker-build]
    if: always()
    steps:
      - name: Check all jobs passed
        if: >-
          !contains(needs.*.result, 'success') ||
          contains(needs.*.result, 'failure') ||
          contains(needs.*.result, 'cancelled')
        run: |
          echo "::error::One or more CI jobs failed."
          exit 1

      - name: CI Gate Passed
        run: echo "All CI checks passed ✓"