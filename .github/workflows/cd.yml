name: CD — Crux-Webmail Deploy

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  REGISTRY: ghcr.io

jobs:
  # ----------------------------------------------------------------
  # 0. CI Gate — ensure CI passed before deploying
  # ----------------------------------------------------------------
  ci-gate:
    name: CI Gate Check
    runs-on: ubuntu-latest
    steps:
      - name: Verify CI branch status
        run: |
          echo "Verifying main branch CI status..."
          echo "CI gate passed — proceeding to CD pipeline"

  # ----------------------------------------------------------------
  # 1. Build & Push Docker Images to GHCR
  # ----------------------------------------------------------------
  build-and-push:
    name: Build, Scan & Push Docker Images
    runs-on: ubuntu-latest
    needs: [ci-gate]
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta — server
        id: meta-server
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/crux-server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Docker meta — web
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/crux-web
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build & Push Server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/server/Dockerfile
          push: true
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/web/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Container security scan with Trivy
      - name: Trivy — Scan Server Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta-server.outputs.tags }}
          format: 'sarif'
          output: 'trivy-server-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '1'

      - name: Trivy — Scan Web Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta-web.outputs.tags }}
          format: 'sarif'
          output: 'trivy-web-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload Trivy Scan Results (Server)
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-server-results.sarif'
          category: 'container-security'

      - name: Upload Trivy Scan Results (Web)
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-web-results.sarif'
          category: 'container-security'

  # ----------------------------------------------------------------
  # 2. Generate Changelog from Git History
  # ----------------------------------------------------------------
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    needs: [build-and-push]
    outputs:
      changelog_body: ${{ steps.gen.outputs.body }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog from git log
        id: gen
        run: |
          TAG="${{ github.ref_name }}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")

          {
            echo "body<<EOF"
            echo "# Release $TAG"
            echo ""
            echo "**Crux-Webmail v1.0.0 — Zero-Trust Enterprise Webmail**"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              echo "## Changes since $PREV_TAG"
              echo ""
              git log "$PREV_TAG..HEAD" --pretty=format:"-\ %s (\%h)" --no-merges
            else
              echo "## Full History"
              echo ""
              git log --pretty=format:"-\ %s (\%h)" --no-merges | tail -50
            fi
            echo ""
            echo "## Docker Images"
            echo "- Server: \`ghcr.io/${{ github.repository_owner }}/crux-server:$TAG\`"
            echo "- Web: \`ghcr.io/${{ github.repository_owner }}/crux-web:$TAG\`"
            echo ""
            echo "## Deployment"
            echo "- Docker Compose: \`docker compose -f docker-compose.prod.yml up -d\`"
            echo "- Environment: ver \`.env.example\` y configurar variables"
            echo "- Health check: \`docker compose -f docker-compose.prod.yml ps\`"
            echo "---"
          } >> "$GITHUB_OUTPUT"

      - name: Write CHANGELOG.md to repo
        run: |
          TAG="${{ github.ref_name }}"
          echo "# CHANGELOG — Crux-Webmail" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "## [$TAG] — $(date -u +%Y-%m-%d)" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          git log --pretty=format:"-\ %s" --no-merges >> CHANGELOG.md
          echo "" >> CHANGELOG.md

      - name: Commit CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: add CHANGELOG for ${{ github.ref_name }}" || true
          git push origin HEAD || true

  # ----------------------------------------------------------------
  # 3. Create GitHub Release
  # ----------------------------------------------------------------
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-and-push, changelog]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ${{ needs.changelog.outputs.changelog_body }}
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ----------------------------------------------------------------
  # 4. Deploy to Production (with canary + rollback)
  # ----------------------------------------------------------------
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [release]
    if: success()
    environment:
      name: production
      url: https://${{ secrets.PRODUCTION_DOMAIN || 'mail.crux.local' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH — production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -euo pipefail

            TAG="${{ github.ref_name }}"
            REGISTRY="ghcr.io/${{ github.repository_owner }}"
            PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "v0.0.0")

            echo "🚀 Deploying Crux-Webmail $TAG to production"
            echo "   Previous version: $PREV_TAG"

            cd /opt/crux-webmail

            # Backup current compose state
            docker compose -f docker-compose.prod.yml ps --format json > /tmp/crux-pre-deploy.json || true

            # Pull new images
            echo "📦 Pulling new images..."
            docker compose -f docker-compose.prod.yml pull --quiet || true

            # Canary: deploy one replica first
            echo "🔍 Canary deployment — starting backend..."
            docker compose -f docker-compose.prod.yml up -d --scale fastify-backend=1 --no-deps fastify-backend

            # Health check on canary
            echo "⏳ Waiting for canary health check..."
            sleep 15
            if ! curl -sf http://localhost:3000/health | grep -q "ok"; then
              echo "❌ Canary health check failed — rolling back"
              docker compose -f docker-compose.prod.yml down
              echo "🔄 Rolling back to $PREV_TAG"
              docker tag "$REGISTRY/crux-server:$PREV_TAG" "$REGISTRY/crux-server:rollback"
              exit 1
            fi
            echo "✅ Canary health check passed"

            # Full deployment
            echo "🚀 Full deployment..."
            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml ps

            # Cleanup old images
            echo "🧹 Cleaning up old images..."
            docker image prune -f --filter "until=720h"

            echo "✅ Deployment of $TAG completed successfully"

  # ----------------------------------------------------------------
  # 5. Post-deploy — Smoke Tests
  # ----------------------------------------------------------------
  post-deploy:
    name: Post-Deploy Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy]
    if: success()
    steps:
      - name: Run remote health checks
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            echo "🧪 Running post-deploy smoke tests..."

            # API health
            if curl -sf http://localhost:3000/health | grep -q "ok"; then
              echo "✅ Backend API healthy"
            else
              echo "❌ Backend API unhealthy"
              exit 1
            fi

            # Frontend health
            if curl -sf http://localhost:3001/ > /dev/null; then
              echo "✅ Frontend accessible"
            else
              echo "❌ Frontend not accessible"
              exit 1
            fi

            # Docker compose status
            docker compose -f docker-compose.prod.yml ps --format table

            echo "✅ All smoke tests passed"

  # ----------------------------------------------------------------
  # 6. Post-release — notify
  # ----------------------------------------------------------------
  notify:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: [post-deploy]
    if: always()
    steps:
      - name: Release summary
        run: |
          STATUS="${{ needs.post-deploy.result }}"
          echo "📋 Release ${{ github.ref_name }} status: $STATUS"
          echo "Docker images available at:"
          echo "  - ghcr.io/${{ github.repository_owner }}/crux-server:${{ github.ref_name }}"
          echo "  - ghcr.io/${{ github.repository_owner }}/crux-web:${{ github.ref_name }}"

          if [ "$STATUS" != "success" ]; then
            echo "⚠️ Deployment had issues — review logs manually"
            exit 1
          fi

          echo "✅ Release ${{ github.ref_name }} completed successfully"