# ============================================================================
# Crux-Webmail — OpenDKIM (firma DKIM del correo saliente)
# ============================================================================
# Las claves se generan con infra/scripts/dkim-genkey.sh (NO se commitean).
# Postfix usa este milter vía smtpd_milters = inet:[opendkim]:8891.
# ============================================================================

Syslog                  yes
SyslogSuccess           yes
LogWhy                  no

UMask                   002
Mode                    sv
Canonicalization        relaxed/simple
MinimumKeyBits          1024
SubDomains              no
AutoRestart             yes
AutoRestartRate         10/1h
Background              no
PidFile                 /var/run/opendkim/opendkim.pid

# Escucha el milter en TCP 8891 en todas las interfaces (alcanzable por postfix)
Socket                  inet:8891

# Firma siempre el header From (anti-tamper)
OversignHeaders         From

# Tablas (refile = soportan patrones); las pobla dkim-genkey.sh
KeyTable                refile:/etc/opendkim/KeyTable
SigningTable            refile:/etc/opendkim/SigningTable

# Sólo firma correo originado en hosts/redes de confianza (no firma entrante)
ExternalIgnoreList      /etc/opendkim/TrustedHosts
InternalHosts           /etc/opendkim/TrustedHosts
