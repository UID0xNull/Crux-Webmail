# ============================================================================
# Alertmanager Configuration — Rutas de alerteo para Crux-Webmail
# ============================================================================
# Rutas: severity=critical → immediate notification,
# severity=warning → 15min silence, default → 30min silence.
# ============================================================================

global:
  resolve_timeout: 5m
  # Set SMTP via envsubst at deploy time or update directly in production:
  smtp_smarthost: 'smtp.crux.local:587'
  smtp_from: 'crux-alerts@crux.local'
  smtp_require_tls: false

# --- Inhibition Rules ---
# Si hay alerta crítica, no molestar con warnings del mismo servicio
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['team', 'cluster']

# --- Route Tree ---
route:
  group_by: ['alertname', 'team', 'cluster']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 30m
  receiver: 'default-receiver'

  routes:
    # Critical alerts → immediate
    - match:
        severity: 'critical'
      receiver: 'critical-receiver'
      group_wait: 10s
      repeat_interval: 10m

    # Security alerts → immediate + separate channel
    - match:
        team: 'security'
      receiver: 'security-receiver'
      group_wait: 15s

    # Warning alerts → delayed
    - match:
        severity: 'warning'
      receiver: 'warning-receiver'
      group_wait: 1m
      repeat_interval: 1h

# --- Receivers ---
receivers:
  - name: 'default-receiver'
    webhook_configs:
      - url: 'http://loki:3100/api/v1/alerts'
        send_resolved: true

  - name: 'critical-receiver'
    webhook_configs:
      - url: 'http://loki:3100/api/v1/alerts'
        send_resolved: true
    # En producción: pagerduty_configs, slack_configs, opsgenie_configs
    # slack_configs:
    #   - api_url: '${SLACK_WEBHOOK_URL}'
    #     channel: '#crux-critical'
    #     send_resolved: true

  - name: 'warning-receiver'
    webhook_configs:
      - url: 'http://loki:3100/api/v1/alerts'
        send_resolved: true

  - name: 'security-receiver'
    webhook_configs:
      - url: 'http://loki:3100/api/v1/alerts'
        send_resolved: true
    # En producción: canal separado + SIEM integration
    # slack_configs:
    #   - api_url: '${SLACK_WEBHOOK_URL}'
    #     channel: '#crux-security'
    #     send_resolved: true