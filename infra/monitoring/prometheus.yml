# ============================================================================
# Prometheus — Configuration
# ============================================================================
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - "alert-rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  # Fastify Backend
  - job_name: fastify-backend
    metrics_path: /api/v1/health/metrics
    static_configs:
      - targets: [fastify-backend:3000]
        labels:
          service: fastify-backend

  # Next.js Frontend
  - job_name: nextjs-frontend
    static_configs:
      - targets: [nextjs-frontend:3001]
        labels:
          service: nextjs-frontend

  # Node Exporter
  - job_name: node-exporter
    static_configs:
      - targets: [node-exporter:9100]

  # cAdvisor
  - job_name: cadvisor
    static_configs:
      - targets: [cadvisor:8080]

  # PostgreSQL
  - job_name: postgres
    static_configs:
      - targets: [postgres:5432]

  # Redis
  - job_name: redis
    static_configs:
      - targets: [redis:6379]

  # MinIO
  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: [minio:9000]

  # Nginx
  - job_name: nginx
    static_configs:
      - targets: [nginx:80]

  # OpenTelemetry Collector
  - job_name: otel-collector
    static_configs:
      - targets: [otel-collector:8888]

  # Docker
  - job_name: docker
    static_configs:
      - targets: [cadvisor:8080]