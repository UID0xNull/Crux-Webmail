# ============================================================================
# Grafana Dashboard Provisioning — Crux-Webmail Dashboards
# ============================================================================
apiVersion: 1

providers:
  - name: 'crux-webmail'
    orgId: 1
    folder: 'Crux-Webmail'
    folderUid: 'crux-webmail'
    type: file
    disableDeletion: true
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/files
      foldersFromFilesStructure: false