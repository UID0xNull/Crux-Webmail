# ============================================================================
# Grafana Provisioning — Datasource: Loki (auto-config on startup)
# ============================================================================
apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://crux-loki:3100
    isDefault: true
    editable: true
    jsonData:
      maxLines: 1000
      timePicker:
        refresh_intervals: true
        refresh_interval: 10s
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    editable: false