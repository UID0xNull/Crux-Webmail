# ============================================================================
# Prometheus Configuration — Métricas para Crux-Webmail
# ============================================================================
# scrape_targets: Fastify backend, Redis exporter, PostgreSQL,
# BullMQ queue metrics, process metrics, Node Exporter.
# ============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  external_labels:
    cluster: 'crux-webmail'
    environment: 'production'

# --- Alerting ---
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

# --- Rule Files ---
rule_files:
  - '/etc/prometheus/rules/*.yml'

# --- Scrape Configs ---
scrape_configs:
  # ------------------------------------------------------------------
  # Fastify Backend — Métricas HTTP + custom metrics (/metrics)
  # Dentro de Docker usar nombres de servicio de la red internal
  # ------------------------------------------------------------------
  - job_name: 'crux-backend'
    static_configs:
      - targets:
          - 'crux-fastify:3000'
        labels:
          service: 'fastify-api'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # ------------------------------------------------------------------
  # Redis Exporter — métricas de Redis
  # ------------------------------------------------------------------
  - job_name: 'redis'
    static_configs:
      - targets:
          - 'redis-exporter:9121'
        labels:
          service: 'redis'

  # ------------------------------------------------------------------
  # PostgreSQL Exporter — métricas de DB
  # ------------------------------------------------------------------
  - job_name: 'postgres'
    static_configs:
      - targets:
          - 'postgres-exporter:9187'
        labels:
          service: 'postgresql'

  # ------------------------------------------------------------------
  # Node Exporter — métricas de sistema (CPU, memory, disk, net)
  # ------------------------------------------------------------------
  - job_name: 'node'
    static_configs:
      - targets:
          - 'node-exporter:9100'
        labels:
          service: 'infrastructure'

  # ------------------------------------------------------------------
  # self — Prometheus métricas de sí mismo
  # ------------------------------------------------------------------
  - job_name: 'prometheus'
    static_configs:
      - targets:
          - 'localhost:9090'