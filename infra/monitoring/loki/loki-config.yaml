# ============================================================================
# Loki Configuration — Log aggregation for Zero-Trust telemetry
# ============================================================================

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  grpc_server_max_recv_msg_size: 0

common:
  instance_label: crux-webmail-loki
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_freshness: 5m
        max_size_mb: 24
        max_items_in_memory: 1024

codecs:
  server_log: json

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 24h
  max_query_series: 500
  max_query_lookback: 365d
  ingestion_rate_mb: 50
  ingestion_burst_size_mb: 100

storage_config:
  filesystem:
    directory: /loki/chunks

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  compaction_interval: 10m

compactor: compactor