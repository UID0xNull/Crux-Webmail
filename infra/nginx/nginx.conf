# ============================================================================
# Crux-Webmail — Nginx Edge Proxy Configuration
# Zero-Trust: strict TLS, CSP headers, rate-limiting, mTLS termination
# ============================================================================

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept        on;
    use                 epoll;
}

http {
    # ------------------------------------------------------------------
    # CORE SETTINGS
    # ------------------------------------------------------------------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay    on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    client_max_body_size 25m;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Hide nginx version
    server_tokens off;

    # Logging — JSON format for structured telemetry
    log_format json_combined escape=json
        '{'
          '"time":"$time_iso8601",'
          '"remote_addr":"$remote_addr",'
          '"remote_user":"$remote_user",'
          '"request":"$request",'
          '"status":$status,'
          '"body_bytes_sent":$body_bytes_sent,'
          '"request_time":$request_time,'
          '"upstream_response_time":"$upstream_response_time",'
          '"http_referer":"$http_referer",'
          '"http_user_agent":"$http_user_agent",'
          '"request_id":"$request_id"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # ------------------------------------------------------------------
    # RATE LIMITING ZONES — DDoS protection
    # ------------------------------------------------------------------
    # Global API rate limit
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    # Auth endpoint rate limit (stricter)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

    # Connection limit per IP
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Whitelist internal networks
    geo $internal {
        default 0;
        172.20.0.0/24  1;
        172.21.0.0/24 1;
        172.22.0.0/24 1;
        172.23.0.0/24 1;
        10.0.0.0/8    1;
        127.0.0.0/8   1;
    }

    # ------------------------------------------------------------------
    # SSL / TLS — STRONG CIPHERS ONLY
    # ------------------------------------------------------------------
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # HSTS — 1 year, include subdomains, preload
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # DH params
    # ssl_dhparam /etc/nginx/certs/dhparam.pem;

    # ------------------------------------------------------------------
    # UPSTREAMS — Backend services
    # ------------------------------------------------------------------

    # Webmail frontend (crux-web service via Docker DNS; Next.js standalone listens on 3000)
    upstream webmail_frontend {
        server frontend.local:3000;
        keepalive 32;
    }

    # Postfix status check (health)
    upstream postfix_status {
        server 172.21.0.10:25;
    }

    # Dovecot IMAP (direct for IMAP-over-proxy if needed)
    upstream dovecot_imap {
        server 172.21.0.11:993;
    }

    # Amavis admin interface
    upstream amavis_admin {
        server 172.21.0.12:9998;
    }

    # Redis health
    upstream redis_health {
        server 172.21.0.15:6379;
    }

    # PostgreSQL health
    upstream postgres_health {
        server 172.22.0.11:5432;
    }

    # ------------------------------------------------------------------
    # MAPS — security headers injection
    # ------------------------------------------------------------------
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Map secure cookies
    map $scheme $cookie_secure {
        https  "Secure";
        default "";
    }

    # ------------------------------------------------------------------
    # HTTP → HTTPS redirect (port 80)
    # ------------------------------------------------------------------
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # ACME challenge directory (for certbot)
        location /.well-known/acme-challenge/ {
            root /usr/share/nginx/html;
            allow all;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ------------------------------------------------------------------
    # HTTPS — Main Server Block
    # ------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name cruxhost.com mail.cruxhost.com webmail.cruxhost.com;

        # SSL certificates
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_trusted_certificate /etc/nginx/certs/chain.pem;

        # ----------------------------------------------------------------
        # SECURITY HEADERS — Zero-Trust defense-in-depth
        # ----------------------------------------------------------------
        add_header X-Content-Type-Options      "nosniff"               always;
        add_header X-Frame-Options             "SAMEORIGIN"            always;
        add_header X-XSS-Protection            "0"                    always;  # modern browsers deprecate
        add_header Referrer-Policy             "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy          "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Cross-Origin-Opener-Policy  "same-origin"           always;
        add_header Cross-Origin-Embedder-Policy "require-corp"         always;
        add_header Cross-Origin-Resource-Policy "same-origin"          always;

        # Content Security Policy — strict
        add_header Content-Security-Policy "default-src 'self'; \\
            script-src 'self'; \\
            style-src 'self' 'unsafe-inline'; \\
            img-src 'self' data: blob:; \\
            font-src 'self'; \\
            connect-src 'self'; \\
            frame-src 'none'; \\
            object-src 'none'; \\
            base-uri 'self'; \\
            form-action 'self'; \\
            media-src 'none'; \\
            worker-src 'none'; \\
            blob-src 'none'; \\
            upgrade-insecure-requests" always;

        # ----------------------------------------------------------------
        # RATE LIMITING
        # ----------------------------------------------------------------
        limit_conn conn_limit 20;
        limit_req zone=api_limit burst=40 nodelay;

        # ----------------------------------------------------------------
        # HEALTH CHECK ENDPOINT
        # ----------------------------------------------------------------
        location /health {
            access_log off;
            return 200 '{"status":"ok","service":"crux-nginx","timestamp":"$time_iso8601"}';
            add_header Content-Type application/json;
        }

        # ----------------------------------------------------------------
        # WEBMAIL FRONTEND (Step 4 target)
        # ----------------------------------------------------------------
        location / {
            # Pure reverse proxy to Next.js — no try_files.
            # try_files + proxy_pass causes an infinite internal redirect loop.
            proxy_pass http://webmail_frontend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
            proxy_set_header X-Request-ID       $request_id;

            # Connection settings
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 90s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 16k;
        }

        # ----------------------------------------------------------------
        # API PROXY (Step 2 target)
        # ----------------------------------------------------------------
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://webmail_frontend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
            proxy_set_header X-Request-ID       $request_id;
            proxy_read_timeout 120s;
        }

        # ----------------------------------------------------------------
        # AUTH ENDPOINT — stricte rate limit
        # ----------------------------------------------------------------
        location /api/auth/ {
            limit_req zone=auth_limit burst=10 nodelay;

            proxy_pass http://webmail_frontend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
            proxy_set_header X-Request-ID       $request_id;
        }

        # ----------------------------------------------------------------
        # STATIC ASSETS — long cache, no CORS needed
        # ----------------------------------------------------------------
        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff";
        }

        # ----------------------------------------------------------------
        # BLOCKED PATHS — explicit deny
        # ----------------------------------------------------------------
        location ~* /\. {  # Block dotfiles (.env, .git, etc)
            deny all;
            return 404;
        }

        location ~* \.(sql|bak|log|conf|cfg|ini|yaml|yml|env)$ {
            deny all;
            return 404;
        }

        # ----------------------------------------------------------------
        # ERROR PAGES
        # ----------------------------------------------------------------
        error_page 400 401 403 404 /error.html;
        error_page 500 502 503 504 /error50x.html;
        location = /error.html {
            internal;
        }
        location = /error50x.html {
            internal;
        }
    }

    # ------------------------------------------------------------------
    # POST-DEPLOYMENT: DNS records for DKIM/SPF/DMARC
    # ------------------------------------------------------------------
    # (Handled via DNS provider, not nginx — but documented here)
    # DKIM:  default._domainkey.crux.local. TXT v=DKIM1; k=ed25519; p=...
    # SPF:   crux.local. TXT v=spf1 mx a -all
    # DMARC: _dmarc.crux.local. TXT v=DMARC1; p=reject; rua=mailto:dmarc@crux.local; rf=afrf
}