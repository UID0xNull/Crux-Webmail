# ============================================================================
# Crux-Webmail — Nginx Edge Proxy Configuration (PRODUCTION)
# ============================================================================
# Hardened for production: strict TLS, rate-limiting, upstream health checks,
# logging en JSON, seguridad Zero-Trust.
#
# Nota: En docker-compose.prod.yml, los servicios están en la red "app"
#   - crux-fastify:3000 → Fastify Backend API
#   - crux-nextjs:3001 → Next.js Frontend
# ============================================================================

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # ------------------------------------------------------------------
    # CORE SETTINGS
    # ------------------------------------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 25m;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Hide nginx version
    server_tokens off;

    # Logging — JSON format for structured telemetry
    log_format json_combined escape=json
        '{'
          '"time":"$time_iso8601",'
          '"remote_addr":"$remote_addr",'
          '"remote_user":"$remote_user",'
          '"request":"$request",'
          '"status":$status,'
          '"body_bytes_sent":$body_bytes_sent,'
          '"request_time":$request_time,'
          '"upstream_response_time":"$upstream_response_time",'
          '"http_referer":"$http_referer",'
          '"http_user_agent":"$http_user_agent",'
          '"request_id":"$request_id"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # ------------------------------------------------------------------
    # RATE LIMITING ZONES — DDoS protection
    # ------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Whitelist internal networks for monitoring bypass
    geo $internal {
        default 0;
        172.0.0.0/8  1;
        10.0.0.0/8   1;
        127.0.0.0/8  1;
    }

    # ------------------------------------------------------------------
    # SSL / TLS — STRONG CIPHERS ONLY (production hardened)
    # ------------------------------------------------------------------
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # HSTS — 1 year, include subdomains, preload
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ------------------------------------------------------------------
    # UPSTREAMS — Backend services (prod network names)
    # Docker Compose DNS resuelve el nombre del servicio a todas las
    # replicas automáticamente (v2.20+ / swarm mode)
    # ------------------------------------------------------------------
    upstream fastify_api {
        server fastify-backend:3000;
        keepalive 32;
    }

    upstream nextjs_frontend {
        server nextjs-frontend:3001;
        keepalive 32;
    }

    # ------------------------------------------------------------------
    # MAPS
    # ------------------------------------------------------------------
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ----------------------------------------------------------------
    # HTTP → HTTPS redirect (port 80)
    # ----------------------------------------------------------------
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Health check — must respond BEFORE redirect (Docker healthcheck)
        location /nginx-health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # ACME challenge directory (for certbot auto-renew)
        location /.well-known/acme-challenge/ {
            root /usr/share/nginx/html;
            allow all;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ------------------------------------------------------------------
    # HTTPS — Main Server Block (PRODUCTION)
    # ------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name mail.crux.local webmail.crux.local;

        # SSL certificates
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_trusted_certificate /etc/nginx/certs/chain.pem;

        # ----------------------------------------------------------------
        # SECURITY HEADERS — Zero-Trust defense-in-depth
        # ----------------------------------------------------------------
        add_header X-Content-Type-Options      "nosniff"               always;
        add_header X-Frame-Options             "DENY"                always;
        add_header Referrer-Policy             "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy          "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Cross-Origin-Opener-Policy  "same-origin"           always;
        add_header Cross-Origin-Embedder-Policy "require-corp"         always;
        add_header Cross-Origin-Resource-Policy "same-origin"          always;

        # Content Security Policy — strict
        add_header Content-Security-Policy "
            default-src 'self';
            script-src 'self' 'strict-dynamic';
            style-src 'self' 'unsafe-inline';
            img-src 'self' data: blob:;
            font-src 'self';
            connect-src 'self';
            frame-src 'none';
            object-src 'none';
            base-uri 'self';
            form-action 'self';
            upgrade-insecure-requests
        " always;

        # ----------------------------------------------------------------
        # RATE LIMITING
        # ----------------------------------------------------------------
        limit_conn conn_limit 20;
        limit_req zone=api_limit burst=40 nodelay;

        # ----------------------------------------------------------------
        # HEALTH CHECK ENDPOINT
        # ----------------------------------------------------------------
        location /nginx-health {
            access_log off;
            return 200 '{"status":"ok","service":"crux-nginx","timestamp":"$time_iso8601"}';
            add_header Content-Type application/json;
        }

        # ----------------------------------------------------------------
        # WEBMAIL FRONTEND — Next.js SPA
        # ----------------------------------------------------------------
        location / {
            proxy_pass http://nextjs_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 90s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;

            # Buffering for static assets
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 16k;
        }

        # ----------------------------------------------------------------
        # API PROXY — Fastify Backend
        # ----------------------------------------------------------------
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://fastify_api/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # Longer timeouts for API operations
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
        }

        # ----------------------------------------------------------------
        # AUTH ENDPOINT — strict rate limit
        # ----------------------------------------------------------------
        location /api/auth/ {
            limit_req zone=auth_limit burst=10 nodelay;

            proxy_pass http://fastify_api/api/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        # ----------------------------------------------------------------
        # STATIC ASSETS — long cache
        # ----------------------------------------------------------------
        location /_next/static/ {
            expires 365d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff";
            access_log off;

            proxy_pass http://nextjs_frontend;
            proxy_set_header Host $host;
        }

        # ----------------------------------------------------------------
        # BLOCKED PATHS — explicit deny
        # ----------------------------------------------------------------
        location ~* /\. {
            deny all;
            return 404;
        }

        location ~* \.(sql|bak|log|conf|cfg|ini|yaml|yml|env)$ {
            deny all;
            return 404;
        }

        # ----------------------------------------------------------------
        # ERROR PAGES
        # ----------------------------------------------------------------
        error_page 400 401 403 404 /error.html;
        error_page 500 502 503 504 /error50x.html;
    }
}