# ============================================================================
# Amavis — Custom Configuration
# ============================================================================
# Crux-Webmail Production Amavis Settings
# ============================================================================

use strict;

# --- Forwarding to ClamAV ---
@av_scanners_always = (
    ['ClamAV-clamd',
      \&ask_daemon, ["CONTSCAN {}\n", "/var/run/clamav/clamd.sock"],
      qr/\bOK$/, qr/\bFOUND$/,
      qr/^.*?: (?!Infected Archive)(.*) FOUND$/ ],
);

# --- Banned Extensions ---
@banned_filename_charset = ('ascii',);
@banned_filename_summary = (
    [r'^\.(asx|chm|cmd|com|cpl|csh|exe|hlp|hta|inf|ins|isp|job|js|jse|lnk|mde|msc|msi|mst|pif|prg|reg|scr|sct|shb|shs|vb|vbe|vbs|vbscript|wsc|wsh)$',
     'executables (extension)'],
    [qr/\015\012?/, 'CRLF (extension)', 1],
);

# --- Spamd Configuration ---
$sa_local_tests_only = 1;
$sa_tag_level_deflt  = -9999;
$sa_tag2_level_deflt = 6.31;
$sa_kill_level_deflt = 10.0;

# --- Virus Quarantine ---
$virus_quarantine_to = 'virus-quarantine@crux.local';
$spam_quarantine_to  = 'spam-quarantine@crux.local';
$banned_files_quarantine_to = 'banned-quarantine@crux.local';

# --- Log Levels ---
$log_level = 1;
$sa_debug = 0;

# --- Notify ---
$notify_returnto_sender_is_sender = 0;

# --- DNS ---
$dns_available = 1;
$undecipherable_sender = 0;

1;