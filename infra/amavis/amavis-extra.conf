# ============================================================================
# Amavis — Custom Configuration (loaded as conf.d/60-user-custom)
# NOTE: no "use strict" — amavis conf.d files run in the amavis package
#       context; strict requires explicit package names and breaks all vars.
# NOTE: @av_scanners_always is intentionally absent — the entrypoint already
#       configures @av_scanners in 15-av_scanners with the correct TCP address
#       of the clamav container. Overriding it here with a Unix socket would
#       break antivirus scanning.
# ============================================================================

# --- SpamAssassin ---
$sa_local_tests_only = 1;
$sa_tag_level_deflt  = -9999;
$sa_tag2_level_deflt = 6.31;
$sa_kill_level_deflt = 10.0;

# --- Banned attachment extensions ---
@banned_filename_charset = ('ascii',);
@banned_filename_re = map { [qr/\.$_\z/i, ".$_ extension blocked"] }
    qw(bat cgi cmd com cpl exe hta inf ins isp job jse lnk msc msi mst
       pif prf reg scr sct shb shs vb vbe vbs vsw ws wsc wsf wsh
       ps1 ps1xml ps2 ps2xml xlsm docm pptm xlsbm asp aspx jsp php);

# --- Quarantine destinations ---
$virus_quarantine_to        = 'virus-quarantine@crux.local';
$spam_quarantine_to         = 'spam-quarantine@crux.local';
$banned_files_quarantine_to = 'banned-quarantine@crux.local';

# --- Logging ---
$log_level = 1;
$sa_debug  = 0;

# --- Misc ---
$notify_returnto_sender_is_sender = 0;
$dns_available = 1;

1;
