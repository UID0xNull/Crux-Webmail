# ============================================================================
# Crux-Webmail — Amavis Configuration
# Central content filter, virus scanner coordinator, spam gatekeeper
# ============================================================================

use strict;
use warnings;

# ----------------------------------------------------------------------------
# INET SOCKET — Listen for Postfix mail
# ----------------------------------------------------------------------------
@$inet_socket_bind = [''];
$inet_socket_port = 10024;

# ----------------------------------------------------------------------------
# POSTFIX HANDOFF — Return filtered mail
# ----------------------------------------------------------------------------
$notify_return_method       = 'smtp';
$bounce_method              = 'smtp';
$forward_method             = 'smtp:[127.0.0.1]:10025';

# ----------------------------------------------------------------------------
# DNS & DNSSEC
# ----------------------------------------------------------------------------
$dns_available           = 1;
$enable_dns_blacklists   = 1;

# DNS relay domains verification (anti-forging)
%dns_relay_tags      = (
    '/^(.+).$/i' => 1,
);
$dns_relay_domains_maps  = [ %dns_relay_tags ];

# ----------------------------------------------------------------------------
# ANTIVIRUS — ClamAV Integration
# ----------------------------------------------------------------------------
@av_scanners = (
  [ 'ClamAV-clamd',
    \&ask_daemon, ['询问', '172.22.0.10:3310'],
    qr/\bOK$/, qr/\bFOUND$/,
    qr/^.*?: (?!Infected Archive)(.*) FOUND$/ ],
);

# ClamAV connection settings
$av_scanners_timeout     = 600;
$max_servers             = 4;

# ----------------------------------------------------------------------------
# SPAM FILTERING — SpamAssassin Integration
# ----------------------------------------------------------------------------
$sa_mail_body_size_limit    = 200*1024;   # bypass SA if size > 200K
$sa_spam_subject_tag        = '***SPAM***';
$sa_quarantine_cutoff_level = 15;
$sa_tag_level_deflt         = 2.0;
$sa_tag2_level_deflt        = 6.31;
$sa_kill_level_deflt        = 15.0;

# SpamAssassin SA-learning integration
$sa_auto_learn             = 1;
$sa_local_tests_mode       = 0;

# ----------------------------------------------------------------------------
# POLICY BANKS — Throttling by IP reputation
# ----------------------------------------------------------------------------
%policy_bank_BUILTIN      = (
  origin => '[BUILTIN]',
  os_fingerprint_tests => 0,
  permadv => 1,
);

%policy_bank_DEFAULT      = (
  origin => 'DEFAULT',
  os_fingerprint_tests => 1,
);

%policy_bank_MAILOUT      = (
  origin => '[MAILOUT]',
  authorize_filter_checks => 0,
  smtpd_discard_ehlo_keywords => ['8BITMIME'],
  acls => [0],
);

%policy_bank_ORIGINATING  = (
  origin      => 'submission/smtps',
  is_local    => 1,
  smtpd_discard_ehlo_keywords => ['dsn', 'enhancedstatuscodes'],
  allow_disclaimers => 1,
  warnings_limit      => 0,
  max_connections     => 50,
);

# ----------------------------------------------------------------------------
# GREYLISTING
# ----------------------------------------------------------------------------
$enable_quarantine        = 1;
$quarantine_method        = 'mailbox:crux-quarantine@quarantine.crux.local';
$release_method           = 'internal:no-ptr';
$quarantine_subject       = 'Quarantine Notice: {virus_name|spam|bad-header} detected';

# ----------------------------------------------------------------------------
# CONTENT FILTERING RULES
# ----------------------------------------------------------------------------

# Blocked file extensions (dangerous payloads)
%banned_attachments = map {
  lc($_); 1
} split(/\s*,\s*/, join(',', (
  # Executables
  'bat', 'cgi', 'cmd', 'com', 'cpl', 'exe', 'hta', 'inf',
  'ins', 'isp', 'job', 'jse', 'ksh', 'lnk', 'mcf',
  'msc', 'msh', 'msh1', 'msh2', 'mshxml', 'msh1xml',
  'msh2xml', 'msi', 'msp', 'mst', 'paf', 'pif', 'prf',
  'reg', 'rgs', 'scr', 'sct', 'shb', 'shs', 'vb',
  'vbe', 'vbs', 'vsw', 'ws', 'wsc', 'wsf', 'wsh',
  # Archive wrappers
  'applescript', 'applescriptdoubleclick',
  # Scripting
  'ps1', 'ps1xml', 'ps2', 'ps2xml',
  # Office macros
  'xlsm', 'docm', 'xlsm', 'pptm', 'xlsbm',
  # Web
  'asp', 'aspx', 'jsp', 'php',
)));

# ----------------------------------------------------------------------------
# HEADER CHECKS — Anti-forging, anti-spoofing
# ----------------------------------------------------------------------------
@header_checks_maps = (
  %header_checks,
  %_header_checks_aux,
);

# ----------------------------------------------------------------------------
# RATE LIMITING & CONNECTION CONTROL
# ----------------------------------------------------------------------------
$sa_dsn_support            = 1;
$smtp_banner_lines = 1;
$max_parts = 50;
$max_files = 50;

# ----------------------------------------------------------------------------
# LOGGING — Structured JSON-ready output
# ----------------------------------------------------------------------------
$log_level           = 2;
$debug_level         = 0;
$log_recip_in_ct     = 1;
$log_microseconds    = 1;
$log_random_context  = 1;

# ----------------------------------------------------------------------------
# DATABASE — Amavis internal DB (SQLite)
# ----------------------------------------------------------------------------
$db_home                   = '/var/lib/amavis/amavis.db';

# ----------------------------------------------------------------------------
# QUARANTINE FORENSICS
# ----------------------------------------------------------------------------
$release_port              = 9998;
$quarantine_port           = 9998;

# Forensic logging of quarantined items
$quarantine_release_justicia = 1;

# ----------------------------------------------------------------------------
# SECURITY HARDENING
# ----------------------------------------------------------------------------
$final_virus_destiny       = D_REJECT;
$final_spam_destiny        = D_DISCARD;
$final_bad_header_destiny  = D_BOUNCE;

# Reject known-bad MIME types
$interface_addr            = '172.21.0.12';
$forward_method            = 'smtp:[172.21.0.10]:10025';