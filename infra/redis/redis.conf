# ============================================================================
# Redis Configuration — Zero-Trust Hardened
# ============================================================================

# Network
bind 127.0.0.1 172.21.0.15
port 6379
protected-mode yes

# TCP backlog
tcp-backlog 511

# Timeout for idle connections (prevent connection hoarding)
timeout 300
tcp-keepalive 300

# TLS
# tls-port 6380
# tls-cert-file /etc/crux-certs/redis.crt
# tls-key-file /etc/crux-certs/redis.key
# tls-ca-cert-file /etc/crux-certs/ca.crt

# General
daemonize no
loglevel notice
logfile /var/log/redis/redis.log

# Database
databases 16

# Security
requirepass ${REDIS_PASSWORD:-ChangeMe_StrongPassword_2024!}
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG ""
rename-command DEBUG ""
rename-command KEYS ""
rename-command SHUTDOWN ""

# Persistence
save 900 1
save 300 10
save 60 10000

# RDB compression
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb

# Max memory policy — evict LRU keys when memory exhausted
maxmemory 256mb
maxmemory-policy allkeys-lru

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Latency monitor
latency-monitor-threshold 100