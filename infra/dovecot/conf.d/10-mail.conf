# ============================================================================
# Dovecot Mail Location & Namespace Configuration
# ============================================================================

# Mail location
mail_location = maildir:/var/mail/%d/%n

# Maximum number of IMAP idle connections before forced re-login
mail_max_userip_connections = 20

# First-valid-uid / Last-valid-uid for sandboxing
# first_valid_uid = 1000
# last_valid_uid  = 1000

# Mail plugins globally
mail_plugins = $mail_plugins

# Mailbox indexes
mail_fsync = optimized

# MMAP optimizations
mail_fsync = 1

# Namespace — inbox
namespace inbox {
  inbox = yes
  separator = /

  # Special folders
  mailbox Drafts {
    auto = subscribe
    special_use = \Drafts
  }
  mailbox Sent {
    auto = subscribe
    special_use = \Sent
  }
  mailbox "Sent Messages" {
    special_use = \Sent
  }
  mailbox Trash {
    auto = subscribe
    special_use = \Trash
  }
  mailbox Junk {
    auto = subscribe
    special_use = \Junk
  }
  mailbox Archive {
    auto = subscribe
    special_use = \Archive
  }
}

# Mail user/quota
service aggregator {
  fifo_listener notification {
    user = dovecot
    mode = 0660
  }
}