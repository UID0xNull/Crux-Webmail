# ============================================================================
# Dovecot LMTP Configuration — Delivery Agent
# ============================================================================

# LMTP service — listens for handoff from Postfix/Amavis
protocol lmtp {
  # LMTP socket for Postfix
  postmaster_address = postmaster@crux.local

  # Mail plugins
  mail_plugins = $mail_plugins sieve
}

# LMTP service socket
service lmtp {
  # El socket vive en el spool compartido con Postfix. La imagen de Dovecot
  # no tiene usuario `postfix`, así que no fijamos user/group: el socket lo
  # crea root (master de Dovecot) y Postfix lo alcanza vía mode 0666.
  unix_listener /var/spool/postfix/private/dovecot-lmtp {
    mode = 0666
  }

  # TCP listener (internal network only)
  # inet_listener lmtp {
  #   address = 172.21.0.11
  #   port    = 24
  # }

  # Process limits for concurrency
  process_min_avail = 4
  client_limit      = 100
}

# Sieve — server-side mail filtering
plugin {
  sieve = file:~/sieve;active=~/.dovecot.sieve
  sieve_global_dir = /etc/dovecot/sieve/global
  sieve_max_scripts = 20
  sieve_max_script_size = 1M
  sieve_global_extensions = +vnd.dovecot.pipe +vnd.dovecot.imap

  # Sieve vacuum — cleanup
  sieve_vacuum = yes
  sieve_vacuum_min_age = 7d
}