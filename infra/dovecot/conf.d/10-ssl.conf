# ============================================================================
# Dovecot SSL/TLS Configuration — Zero-Trust Hardened (Dovecot 2.3)
# ============================================================================

# SSL required for all connections
ssl = required

# Certificate files (internal CA-signed) — identidad propia del servicio:
# cert con SAN dovecot.crux.local (generado por infra/scripts/mtls-setup.sh).
ssl_cert = </etc/crux-certs/dovecot.crt
ssl_key  = </etc/crux-certs/dovecot.key
ssl_ca   = </etc/crux-certs/ca-chain.crt

# TLS minimum version — TLS 1.2 mandatory, 1.3 preferred
ssl_min_protocol = TLSv1.2

# Prefer server ciphers (defense against downgrade attacks)
ssl_prefer_server_ciphers = no

# TLS 1.3 cipher suites (AEAD only)
ssl_cipher_suites = TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256

# TLS 1.2 fallback cipher list (AEAD / ECDHE only)
ssl_cipher_list = ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256

# Client certificate verification (mTLS for internal services)
# Descomentar cuando el client CA esté en su sitio:
# ssl_verify_client_cert = yes
