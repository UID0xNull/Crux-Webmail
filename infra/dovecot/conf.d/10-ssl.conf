# ============================================================================
# Dovecot SSL/TLS Configuration — Zero-Trust Hardened
# ============================================================================

# SSL required for all connections
ssl = required

# Certificate files (internal CA-signed)
ssl_cert     = </etc/crux-certs/server.crt
ssl_key      = </etc/crux-certs/server.key
ssl_ca       = </etc/crux-certs/ca-chain.crt

# TLS minimum version — TLS 1.2 mandatory, 1.3 preferred
ssl_min_protocol_version = TLSv1.2

# Prefer server ciphers (defense against downgrade attacks)
ssl_prefer_server_ciphers = no

# TLS 1.3 cipher suites ONLY
ssl_cipher_suites = TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256

# TLS 1.2 fallback cipher list (AEAD only)
ssl_cipher_list = \
  ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:\
  ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305\:
  ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256

# Disable weak features
ssl_curves = X25519:P-521:P-384:P-256

# OCSP stapling (optional, requires proper CA setup)
# ssl_stapling = yes
# ssl_stapling_verbose = yes

# Client certificate verification (mTLS for internal services)
# ssl_verify_client_cert = yes
# ssl_client_ca_file = /etc/crux-certs/client-ca.crt

# DH parameters — custom 4096-bit
ssl_dh = # <base64 DH params here (4096-bit)

# Minimum SSL version enforced globally
ssl_min_version = TLSv1.2

# X.509 extended validation
ssl_verify_reverse_dns = yes
ssl_verify_client_shallow = no