# ============================================================================
# Dovecot Authentication Configuration — Zero-Trust Hardened
# ============================================================================

# Disable plaintext auth unless over TLS
disable_plaintext_auth = yes

# Auth mechanisms
auth_mechanisms = plain login

# Password scheme — Argon2id (best available) or bcrypt
passdb {
  driver = sql
  args   = /etc/dovecot/dovecot-sql.conf.ext
}

# User lookup
userdb {
  driver = sql
  args   = /etc/dovecot/dovecot-sql.conf.ext
}

# ============================================================================
# Master user — el backend webmail se autentica como `usuario*masteruser`
# con la master password, sin necesitar la contraseña de cada usuario.
# El separador debe coincidir con IMAP_MASTER_SEPARATOR del backend (def '*').
# La password del archivo master-users debe ser IGUAL a IMAP_MASTER_PASSWORD.
# ============================================================================
auth_master_user_separator = *

passdb {
  driver = passwd-file
  master = yes
  args   = /etc/dovecot/master-users
}

# Auth service — expone SASL a Postfix
service auth {
  # Socket unix (en el spool compartido con Postfix) — autenticación local.
  unix_listener /var/spool/postfix/private/auth {
    mode  = 0666
  }

  unix_listener auth-userdb {
    mode  = 0600
  }

  # SASL por TCP para Postfix submission (main.cf: smtpd_sasl_path =
  # inet:[dovecot]:12345). Sólo alcanzable en la red interna `mail`.
  inet_listener auth-postfix {
    port = 12345
  }

  # Auth process limits — el service auth es un único proceso maestro
  # (process_limit DEBE ser 1, el default). La concurrencia se controla
  # con client_limit, no con múltiples procesos.
  client_limit    = 1000
}

# Extra auth restrictions
auth_realms = crux.local

# Auth failure delay (brute-force mitigation)
auth_failure_delay = 2 secs

# Maximum login attempts before lockout
# (requires PAM or custom plugin)