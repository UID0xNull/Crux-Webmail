# ============================================================================
# Dovecot — Local Override Configuration
# ============================================================================
# Crux-Webmail Production Dovecot Settings
# Mounts as 99-local.conf (highest priority in conf.d/)
# ============================================================================

# --- Mail Location ---
mail_location = maildir:/var/mail/vhosts/%d/%n/

# --- SSL/TLS --- (identidad propia: cert con SAN dovecot.crux.local)
ssl = required
ssl_cert = </etc/crux-certs/dovecot.crt
ssl_key = </etc/crux-certs/dovecot.key
ssl_min_version = TLSv1.2
ssl_prefer_server_ciphers = yes

# --- Authentication ---
auth_mechanisms = plain login
auth_default_realm = crux.local

# --- Mailbox Settings ---
protocol imap {
  mail_max_userip_connections = 10
}

protocol lda {
  hostname = crux.local
}

# --- Namespace ---
namespace inbox {
  inbox = yes
  separator = /
  mailbox Drafts {
    special_use = \Drafts
  }
  mailbox Sent {
    special_use = \Sent
  }
  mailbox Trash {
    special_use = \Trash
  }
  mailbox Junk {
    special_use = \Junk
  }
  mailbox Archive {
    special_use = \Archive
  }
}

# --- Sieve (Server-side Filtering) ---
plugin {
  sieve = /var/mail/sieve/%d/%n/.sieve
  sieve_dir = /var/mail/sieve/%d/%n/scripts/
  sieve_global_dir = /var/mail/sieve/global/
}

# --- Mail Plugins ---
mail_plugins = $mail_plugins sieve

# --- Service Auth for Postfix SASL ---
service auth {
  unix_listener auth-userdb {
    mode = 0600
    user = vmail
    group = vmail
  }
  unix_listener /var/spool/postfix/private/auth {
    mode = 0660
    user = postfix
    group = postfix
  }
}

# --- Logging ---
log_path = /var/log/dovecot/dovecot.log
syslog_facility = local-mail

# --- Login Process ---
service imap-login {
  inet_listener imap {
    port = 143
  }
  inet_listener imaps {
    port = 993
    ssl = yes
  }
}

service pop3-login {
  inet_listener pop3 {
    port = 110
  }
  inet_listener pop3s {
    port = 995
    ssl = yes
  }
}