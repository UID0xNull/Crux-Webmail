LogFile /var/log/clamav/clamd.log
LogFileMaxSize 25M
LogTime yes
LogClean yes
FixStaleSocket true

# Unix socket — used by the Docker init script to detect when clamd is ready
LocalSocket /run/clamav/clamd.ctl
LocalSocketMode 666

# TCP — used by amavis and other services over the Docker network
TCPSocket 3310
TCPAddr 0.0.0.0

ScanMail true
ScanPE true
ScanELF true

MaxDirectoryRecursion 30

DatabaseDirectory /var/lib/clamav/db