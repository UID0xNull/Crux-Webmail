LogFile /var/log/clamav/clamd.log
LogFileMaxSize 25M
LogTime yes
LogClean yes
FixStaleSocket true

# Unix socket — debe usar el path/nombre por defecto que espera el
# healthcheck de la imagen clamav/clamav (clamdcheck.sh busca /run/clamav/clamd.sock).
LocalSocket /run/clamav/clamd.sock
LocalSocketMode 666

# TCP — used by Amavis and other services over the Docker network
TCPSocket 3310
TCPAddr 0.0.0.0

ScanMail true
ScanPE true
ScanELF true

MaxDirectoryRecursion 30

# Matches the default path used by the official clamav/clamav image and the mounted volume
DatabaseDirectory /var/lib/clamav
