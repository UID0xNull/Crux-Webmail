# ============================================================================
# Crux-Webmail — Docker Compose PRODUCTION
# ============================================================================
# Uso: docker compose -f docker-compose.prod.yml up -d
#
# Diferencias vs compose dev:
#   - Imágenes referenciadas desde registry (con fallback a build local)
#   - Resources: limits + reservations en todos los servicios
#   - Secrets desde Docker Swarm / vault externo
#   - Restart policies estrictas
#   - Logs rotados con max-size menor
#   - Replicas para alta disponibilidad del backend
#   - sin dependencias de dev ni tooling de testing
# ============================================================================

# ------------------------------------------------------------------
# NETWORKS
# ------------------------------------------------------------------
networks:
  public:
    driver: bridge
  app:
    driver: bridge
    internal: true
  data:
    driver: bridge
    internal: true

# ------------------------------------------------------------------
# VOLUMES
# ------------------------------------------------------------------
volumes:
  postgres_prod_data:
    driver: local
  redis_prod_data:
    driver: local
  logs_prod:
    driver: local

# ------------------------------------------------------------------
# SECRETS
# ------------------------------------------------------------------
secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  jwt_refresh_secret:
    file: ./secrets/jwt_refresh_secret.txt
  session_encryption_key:
    file: ./secrets/session_encryption_key.txt
  ip_hash_salt:
    file: ./secrets/ip_hash_salt.txt

# ------------------------------------------------------------------
# SERVICES
# ------------------------------------------------------------------
services:
  # =================================================================
  # Edge Proxy — Nginx (TLS termination + reverse proxy)
  # =================================================================
  nginx:
    image: nginx:1.27-alpine
    container_name: crux-nginx-prod
    networks:
      - public
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
      - logs_prod:/var/log/nginx:rw
    tmpfs:
      - /var/cache/nginx:size=128M
      - /var/run:size=64M
      - /tmp:size=64M
    read_only: true
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && wget -qO- http://localhost:80/nginx-health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "5"
    depends_on:
      fastify-backend:
        condition: service_healthy
      nextjs-frontend:
        condition: service_started

  # =================================================================
  # Fastify Backend API
  # =================================================================
  fastify-backend:
    image: ghcr.io/crux/crux-server:latest
    pull_policy: if_not_present
    build:
      context: .
      dockerfile: src/server/Dockerfile
      target: runner
    networks:
      - app
      - data
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=3000
      - LOG_LEVEL=info

      # PostgreSQL
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-crux_mail}
      - POSTGRES_USER=${POSTGRES_USER:-crux_user}
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password

      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD_FILE=/run/secrets/redis_password

      # IMAP/SMTP
      - DOVECOT_HOST=${DOVECOT_HOST:-dovecot}
      - DOVECOT_PORT=993
      - POSTFIX_HOST=${POSTFIX_HOST:-postfix}
      - POSTFIX_PORT=587

      # Storage
      - MINIO_HOST=minio
      - MINIO_PORT=9000
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-crux_storage}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-CruxMinIO_2024!sT8vWq#jR3nXpZ}

      # OTel
      - OTLP_ENDPOINT=http://otel-collector:4318

      # JWT & Encryption
      - JWT_SECRET_FILE=/run/secrets/jwt_secret
      - JWT_REFRESH_SECRET_FILE=/run/secrets/jwt_refresh_secret
      - SESSION_ENCRYPTION_KEY_FILE=/run/secrets/session_encryption_key
      - IP_HASH_SALT_FILE=/run/secrets/ip_hash_salt
    tmpfs:
      - /tmp:size=64M
    read_only: true
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 60s
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    secrets:
      - postgres_password
      - redis_password
      - jwt_secret
      - jwt_refresh_secret
      - session_encryption_key
      - ip_hash_salt
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "5"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # =================================================================
  # Next.js Frontend
  # =================================================================
  nextjs-frontend:
    image: ghcr.io/crux/crux-web:latest
    pull_policy: if_not_present
    build:
      context: .
      dockerfile: src/web/Dockerfile
      target: runner
    networks:
      - app
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://fastify-backend:3000
      - NEXT_TELEMETRY_DISABLED=1
      - HOST=0.0.0.0
      - PORT=3001
    tmpfs:
      - /tmp:size=32M
    read_only: true
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 60s
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3001/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "15m"
        max-file: "3"
    depends_on:
      fastify-backend:
        condition: service_healthy

  # =================================================================
  # PostgreSQL
  # =================================================================
  postgres:
    image: postgres:17-alpine
    container_name: crux-postgres-prod
    networks:
      - data
    expose:
      - "5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data:rw
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-crux_mail}
      - POSTGRES_USER=${POSTGRES_USER:-crux_user}
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
      - POSTGRES_INITDB_ARGS=--data-checksums
    tmpfs:
      - /tmp:size=64M
      - /var/run/postgresql:size=32M
    read_only: true
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
      - CHOWN
    secrets:
      - postgres_password
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "5"

  # =================================================================
  # Redis
  # =================================================================
  redis:
    image: redis:7-alpine
    container_name: crux-redis-prod
    networks:
      - app
      - data
    expose:
      - "6379"
    volumes:
      - redis_prod_data:/data:rw
    command: >
      sh -c "redis-server --requirepass $(cat /run/secrets/redis_password)"
    tmpfs:
      - /tmp:size=32M
    read_only: true
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $(cat /run/secrets/redis_password) ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    secrets:
      - redis_password
    logging:
      driver: json-file
      options:
        max-size: "15m"
        max-file: "3"