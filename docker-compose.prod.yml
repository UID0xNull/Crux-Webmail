# ============================================================================
# Crux-Webmail — Docker Compose PRODUCTION
# Uso: docker compose -f docker-compose.prod.yml up -d
# ============================================================================

networks:
  public:
    driver: bridge
  app:
    driver: bridge
    internal: true
  data:
    driver: bridge
    internal: true
  mail:
    driver: bridge
    internal: true
  monitoring:
    driver: bridge
    internal: true

volumes:
  postgres_prod_data:
    driver: local
  redis_prod_data:
    driver: local
  logs_prod:
    driver: local
  dovecot_mail:
    driver: local
  dovecot_sieve:
    driver: local
  amavis_virus:
    driver: local
  clamav_database:
    driver: local
  clamav_persistent:
    driver: local
  postfix_data:
    driver: local
  postfix_queue:
    driver: local
  minio_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
  alertmanager_data:
    driver: local

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  jwt_refresh_secret:
    file: ./secrets/jwt_refresh_secret.txt
  session_encryption_key:
    file: ./secrets/session_encryption_key.txt
  ip_hash_salt:
    file: ./secrets/ip_hash_salt.txt
  minio_access_key:
    file: ./secrets/minio_access_key.txt
  minio_secret_key:
    file: ./secrets/minio_secret_key.txt
  dovecot_master_password:
    file: ./secrets/dovecot_master_password.txt
  postfix_smtp_password:
    file: ./secrets/postfix_smtp_password.txt
  grafana_admin_password:
    file: ./secrets/grafana_admin_password.txt
  otel_api_key:
    file: ./secrets/otel_api_key.txt

services:
  postgres:
    image: "postgres:17-alpine"
    restart: always
    environment:
      POSTGRES_USER: crux_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: crux_mail
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    secrets:
      - postgres_password
    networks:
      app:
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crux_user -d crux_mail || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 5

  redis:
    image: "redis:7-alpine"
    restart: always
    volumes:
      - redis_prod_data:/data
    networks:
      app:
    secrets:
      - redis_password
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  minio:
    image: "minio/minio:latest"
    restart: always
    volumes:
      - minio_data:/data
    networks:
      data:
        aliases:
          - storage.local
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  fastify-backend:
    image: "ghcr.io/crux/fastify-backend:${CRUX_VERSION:-latest}"
    restart: always
    expose:
      - 3000/tcp
    volumes:
      - logs_prod:/logs/app/fastify-backend
    networks:
      app:
      data:
      public:
        aliases:
          - backend.local
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "4.0"
          memory: 8G
        reservations:
          cpus: "1.0"
          memory: 2G

  crux-server:
    image: "ghcr.io/crux/server:${CRUX_VERSION:-latest}"
    restart: always
    expose:
      - 5678/tcp
    networks:
      app:
      data:
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "4.0"
          memory: 8G
        reservations:
          cpus: "2.0"
          memory: 4G

  crux-web:
    image: "ghcr.io/crux/web:${CRUX_VERSION:-latest}"
    restart: always
    expose:
      - 80/tcp
    networks:
      app:
      public:
        aliases:
          - frontend.local
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  nginx-proxy:
    image: "nginx:1.25-alpine"
    restart: always
    volumes:
      - type: bind
        source: "./config/nginx/conf.d"
        target: /etc/nginx/conf.d
    ports:
      - published: "80"
        target: 80
        protocol: tcp
      - published: "443"
        target: 443
        protocol: tcp
      - published: "25"
        target: 25
        protocol: tcp
      - published: "143"
        target: 143
        protocol: tcp
    networks:
      public:
      app:
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  dovecot:
    image: "ghcr.io/crux/dovecot:${CRUX_VERSION:-latest}"
    restart: always
    volumes:
      - dovecot_mail:/var/vmail/mailboxes
      - dovecot_sieve:/etc/sieve/conf.d
      - logs_prod:/logs/app/dovecot
    networks:
      mail:
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G

  amavis-virus:
    image: "ghcr.io/crux/amavis:${CRUX_VERSION:-latest}"
    restart: always
    volumes:
      - amavis_virus:/var/virus
      - logs_prod:/logs/app/amavis
    networks:
      mail:
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  clamdav:
    image: "ghcr.io/crux/clamdav:${CRUX_VERSION:-latest}"
    restart: always
    volumes:
      - type: bind
        source: "./config/clamav/conf.d"
        target: /etc/clamav/
      - clamav_database:/var/lib/clamav/db
      - clamav_persistent:/var/lib/clamav/persistent
      - logs_prod:/logs/app/clamdav
    networks:
      mail:
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  postfix:
    image: "ghcr.io/crux/postfix:${CRUX_VERSION:-latest}"
    restart: always
    volumes:
      - type: bind
        source: "./config/postfix/conf.d"
        target: /etc/postfix/
      - postfix_data:/var/lib/postfix/data
      - postfix_queue:/var/lib/postfix/queue
      - logs_prod:/logs/app/postfix
    networks:
      mail:
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  prometheus:
    image: "ghcr.io/crux/prometheus:${CRUX_VERSION:-latest}"
    restart: always
    volumes:
      - type: bind
        source: "./config/prometheus/conf.d"
        target: /etc/prometheus/
      - prometheus_data:/prometheus/data
    networks:
      monitoring:
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  grafana:
    image: "ghcr.io/crux/grafana:${CRUX_VERSION:-latest}"
    restart: always
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      monitoring:
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 2G

  loki:
    image: "ghcr.io/crux/loki:${CRUX_VERSION:-latest}"
    restart: always
    volumes:
      - type: bind
        source: "./config/loki/conf.d"
        target: /etc/loki/
      - loki_data:/loki/data
    networks:
      monitoring:
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G

  alertmanager:
    image: "ghcr.io/crux/alertmanager:${CRUX_VERSION:-latest}"
    restart: always
    volumes:
      - type: bind
        source: "./config/alertmanager/conf.d"
        target: /etc/alertmanager/
    networks:
      monitoring:
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  node_exporter:
    image: "ghcr.io/crux/node-exporter:${CRUX_VERSION:-latest}"
    restart: always
    networks:
      monitoring:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G