# ============================================================================
# Crux-Webmail — Docker Compose PRODUCTION
# Uso: docker compose -f docker-compose.prod.yml up -d
# ============================================================================
# Nota: generar secrets con 'cat > ./secrets/*.txt' antes de levantar.
#       El script deploy-prod.sh verifica que existan todos los .txt files.

networks:
  public:
    driver: bridge
  app:
    driver: bridge
    internal: true
  data:
    driver: bridge
    internal: true
  mail:
    driver: bridge
    internal: true
  monitoring:
    driver: bridge
    internal: true
  security-updates:
    driver: bridge
    # Not internal — allows sa-update and freshclam to reach the internet

volumes:
  postgres_prod_data:
    driver: local
  redis_prod_data:
    driver: local
  logs_prod:
    driver: local
  dovecot_mail:
    driver: local
  dovecot_sieve:
    driver: local
  amavis_virus:
    driver: local
  spamassassin_data:
    driver: local
  clamav_database:
    driver: local
  clamav_persistent:
    driver: local
  postfix_data:
    driver: local
  postfix_queue:
    driver: local
  minio_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
  alertmanager_data:
    driver: local

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  jwt_refresh_secret:
    file: ./secrets/jwt_refresh_secret.txt
  session_encryption_key:
    file: ./secrets/session_encryption_key.txt
  ip_hash_salt:
    file: ./secrets/ip_hash_salt.txt
  minio_access_key:
    file: ./secrets/minio_access_key.txt
  minio_secret_key:
    file: ./secrets/minio_secret_key.txt
  dovecot_master_password:
    file: ./secrets/dovecot_master_password.txt
  postfix_smtp_password:
    file: ./secrets/postfix_smtp_password.txt
  grafana_admin_password:
    file: ./secrets/grafana_admin_password.txt
  otel_api_key:
    file: ./secrets/otel_api_key.txt
  alertmanager_webhook_url:
    file: ./secrets/alertmanager_webhook_url.txt

services:
  postgres:
    image: "postgres:17-alpine"
    restart: always
    environment:
      POSTGRES_USER: crux_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: crux_mail
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    secrets:
      - postgres_password
    networks:
      app:
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crux_user -d crux_mail || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 5

  redis:
    image: "redis:7-alpine"
    restart: always
    volumes:
      - redis_prod_data:/data
    networks:
      app:
    secrets:
      - redis_password
    command: >-
      sh -c 'exec redis-server --requirepass "$(cat /run/secrets/redis_password)"'
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$(cat /run/secrets/redis_password)\" ping | grep -q PONG || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "0.5"
  minio:
    image: "minio/minio:latest"
    restart: always
    volumes:
      - minio_data:/data
    secrets:
      - minio_access_key
      - minio_secret_key
    entrypoint: >-
      sh -c '
        export MINIO_ROOT_USER="$(cat /run/secrets/minio_access_key)"
        export MINIO_ROOT_PASSWORD="$(cat /run/secrets/minio_secret_key)"
        exec minio server /data --console-address=:9001'
    networks:
      - data
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  fastify-backend:
    build:
      context: .
      dockerfile: src/server/Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      SERVER_PORT: "3000"
      # Postgres
      POSTGRES_DB: crux_mail
      POSTGRES_USER: crux_user
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      # Redis
      REDIS_HOST: redis
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
      # JWT & Sessions
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      JWT_REFRESH_SECRET_FILE: /run/secrets/jwt_refresh_secret
      SESSION_ENCRYPTION_KEY_FILE: /run/secrets/session_encryption_key
      # Rate-limiting / security
      IP_HASH_SALT_FILE: /run/secrets/ip_hash_salt
      # MinIO (credentials from Docker secrets, not hardcoded)
      MINIO_ROOT_USER_FILE: /run/secrets/minio_access_key
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_secret_key
    secrets:
      - jwt_secret
      - jwt_refresh_secret
      - session_encryption_key
      - postgres_password
      - redis_password
      - ip_hash_salt
      - minio_access_key
      - minio_secret_key
    volumes:
      - logs_prod:/logs/app/fastify-backend
    expose:
      - "3000/tcp"
    networks:
      app:
      data:
      public:
        aliases:
          - backend.local
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "4.0"
          memory: 8G
        reservations:
          cpus: "1.0"
          memory: 2G

  crux-server:
    image: "crux-server:${CRUX_VERSION:-latest}"
    build:
      context: .
      dockerfile: src/server/Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      SERVER_PORT: "3000"
      # Postgres via Docker secret (resolved by backend app.config.ts)
      POSTGRES_DB: crux_mail
      POSTGRES_USER: crux_user
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      # Redis
      REDIS_HOST: redis
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
      # JWT & Sessions via secrets
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      JWT_REFRESH_SECRET_FILE: /run/secrets/jwt_refresh_secret
      SESSION_ENCRYPTION_KEY_FILE: /run/secrets/session_encryption_key
      # Rate-limiting / security
      IP_HASH_SALT_FILE: /run/secrets/ip_hash_salt
      # MinIO via secrets (no hardcode)
      MINIO_ROOT_USER_FILE: /run/secrets/minio_access_key
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_secret_key
    secrets:
      - postgres_password
      - redis_password
      - jwt_secret
      - jwt_refresh_secret
      - session_encryption_key
      - ip_hash_salt
      - minio_access_key
      - minio_secret_key
    expose:
      - 5678/tcp
    networks:
      app:
      data:
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "4.0"
          memory: 8G
        reservations:
          cpus: "2.0"
          memory: 4G

  crux-web:
    build:
      context: .
      dockerfile: src/web/Dockerfile
    image: "crux-web:${CRUX_VERSION:-latest}"
    restart: always
    expose:
      - 3000/tcp
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_API_URL=http://backend.local:3000
    networks:
      app:
      public:
        aliases:
          - frontend.local
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').request({host:'127.0.0.1',port:3000,path:'/'}, (r)=>{process.exit(0)}).on('error',()=>process.exit(1)).end()\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  nginx-proxy:
    image: "nginx:stable-alpine"
    restart: always
    volumes:
      - type: bind
        source: "./infra/nginx"
        target: /etc/nginx
    ports:
      - published: "80"
        target: 80
        protocol: tcp
      - published: "443"
        target: 443
        protocol: tcp
      - published: "25"
        target: 25
        protocol: tcp
      - published: "143"
        target: 143
        protocol: tcp
    networks:
      public:
      app:
      mail:
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  dovecot:
    image: "dovecot/dovecot:2.3-latest"
    restart: always
    volumes:
      - dovecot_mail:/var/vmail/mailboxes
      - dovecot_sieve:/etc/sieve/conf.d
      - logs_prod:/logs/app/dovecot
    networks:
      mail:
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G

  amavis-virus:
    image: "vednil/amavis:latest"
    hostname: mail.crux.local
    restart: always
    environment:
      DOMAIN: mail.crux.local
      CLAMAV_HOST: clamav
      POSTFIX_HOST: postfix
      WORKERS_COUNT: 1
    volumes:
      - amavis_virus:/var/lib/amavis
      - spamassassin_data:/var/lib/spamassassin
      - logs_prod:/logs/app/amavis
      - type: bind
        source: "./infra/amavis/amavis-extra.conf"
        target: /etc/amavis/conf.d/60-user-custom
    networks:
      mail:
      security-updates:
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  clamav:
    image: "clamav/clamav:latest"
    restart: always
    volumes:
      - type: bind
        source: "./infra/clamav/conf.d/clamd.conf"
        target: /etc/clamav/clamd.conf
      - type: bind
        source: "./infra/clamav/conf.d/freshclam.conf"
        target: /etc/clamav/freshclam.conf
      - clamav_database:/var/lib/clamav/db
      - clamav_persistent:/var/lib/clamav/persistent
      - logs_prod:/logs/app/clamdav
    networks:
      mail:
      security-updates:
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  postfix:
    image: "vednil/postfix:latest"
    hostname: mail.crux.local
    restart: always
    environment:
      DOMAIN: mail.crux.local
      DOVECOT_HOST: dovecot
      AMAVIS_HOST: amavis-virus
      OPENDKIM_HOST: "127.0.0.1"
      OPENDMARC_HOST: "127.0.0.1"
      DB_HOST: postgres
      DB_USER: crux_user
      DB_PASSWORD: ""
      DB_NAME: crux_mail
    volumes:
      # Mount individual config files — do NOT mount the whole directory.
      # Mounting ./infra/postfix → /etc/postfix/ hides postfix-files, which
      # prevents post-install from initialising the spool queue subdirs.
      - type: bind
        source: "./infra/postfix/main.cf"
        target: /etc/postfix/main.cf
      - type: bind
        source: "./infra/postfix/master.cf"
        target: /etc/postfix/master.cf
        read_only: true
      - type: bind
        source: "./infra/postfix/header_checks"
        target: /etc/postfix/header_checks
        read_only: true
      - type: bind
        source: "./infra/postfix/body_checks"
        target: /etc/postfix/body_checks
        read_only: true
      - type: bind
        source: "./infra/postfix/sql"
        target: /etc/postfix/sql
      - postfix_data:/var/lib/postfix
      - postfix_queue:/var/spool/postfix
      - logs_prod:/logs/app/postfix
    networks:
      mail:
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  prometheus:
    image: "prom/prometheus:latest"
    restart: always
    volumes:
      - type: bind
        source: "./infra/monitoring/prometheus"
        target: /etc/prometheus
      - prometheus_data:/prometheus/data
    networks:
      monitoring:
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  grafana:
    image: "grafana/grafana:latest"
    restart: always
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      monitoring:
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 2G

  loki:
    image: "grafana/loki:latest"
    restart: always
    command: "-config.file=/etc/loki/loki-config.yaml"
    volumes:
      - type: bind
        source: "./infra/monitoring/loki/loki-config.yaml"
        target: /etc/loki/loki-config.yaml
        read_only: true
      - loki_data:/loki/data
    networks:
      monitoring:
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G

  alertmanager:
    image: "prom/alertmanager:latest"
    restart: always
    command: >-
      --config.file=/etc/alertmanager/alertmanager.yml
      --storage.path=/alertmanager
    volumes:
      - type: bind
        source: "./infra/monitoring/alertmanager/alertmanager.yml"
        target: /etc/alertmanager/alertmanager.yml
        read_only: true
      - alertmanager_data:/alertmanager
    networks:
      monitoring:
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  node_exporter:
    image: "quay.io/prometheus/node-exporter:v1.8.2"
    restart: always
    networks:
      monitoring:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G