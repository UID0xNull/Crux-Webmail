global:
  resolve_timeout: 5m

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  group_by:
    - alertname
    - severity
    - service
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical_alerts'
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: 'warning_alerts'

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://loki:3100/insert/alerts'
        send_resolved: true

  - name: 'critical_alerts'
    webhook_configs:
      - url: 'http://loki:3100/insert/alerts'
        send_resolved: true

  - name: 'warning_alerts'
    webhook_configs:
      - url: 'http://loki:3100/insert/alerts'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal:
      - alertname
      - service