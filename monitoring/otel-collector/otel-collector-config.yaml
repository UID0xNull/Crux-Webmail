# ============================================================================
# OpenTelemetry Collector — Crux-Webmail Production
# ============================================================================
# Receives traces/metrics via OTLP from Fastify backend, exports to:
#   - Prometheus (metrics)
#   - Loki (logs)
#   - Debug (only for development fallback)
# ============================================================================

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

  hostmetrics:
    collection_interval: 30s
    scrapers:
      - cpu
      - memory
      - disk
      - network

processors:
  batch:
    timeout: 5s
    send_batch_size: 10000

  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 128

  # Add resource attributes for service identification
  resourcedetection:
    detectors: [env, system]
    system:
      hostname: FQDN

  # Transform attributes for Prometheus compatibility
  transform:
    log_statements:
      - context: resource
        statements:
          - set(attributes["service.name"], attributes["service.name"]) where attributes["service.name"] != ""

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

exporters:
  # Debug output (development fallback — low verbosity in prod)
  debug:
    verbosity: basic

  # Prometheus Remote Write — metrics endpoint
  prometheusremotewrite:
    endpoint: http://crux-prometheus:9090/api/v1/write
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 100
    resource_to_telemetry_conversion:
      enabled: true

  # Loki — log aggregation
  loki:
    endpoint: http://loki:3100/loki/api/v1/push
    sending_queue:
      enabled: true
      num_consumers: 2
      queue_size: 50

  # Prometheus exporter for service-level metrics (scrapable)
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: otel

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]

    metrics:
      receivers: [otlp, hostmetrics]
      processors: [memory_limiter, resourcedetection, batch]
      exporters: [prometheusremotewrite, prometheus]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [loki]

  extensions: [health_check]