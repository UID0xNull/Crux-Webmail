# ============================================================================
# Amavis Configuration — Crux-Webmail Enterprise
# Content filter + antivirus bridge between Postfix and Dovecot
# ============================================================================

use strict;
use warnings;

# Amavis binds to this port for Postfix handoff
$inet_socket_port = 10024;

# Internal MTA address (used for unspam, unrave, DSN)
$notify_return_rcpt = 'postmaster@crux.local';

# Enable ClamAV via clamd socket
@av_scanners = (
    ['ClamAV-clamd',
     \&ask_daemon, "<!\>", ["/var/run/clamav/clamd.ctl"],
     qr/(?x:  OK$)/m,  qr/(?x: FOUND$)/m,
     qr/(?x:  CORRUPTED$)/m,  qr/(?x:  PAYLOAD$)/m,
     qr/(?x:  ERROR$)/m,
    ]
);

# Bypass spam checks for authenticated users
$bypass_spam_checks_maps = (1);

# Max number of children
$max_servers = 2;

# Log level
$log_level = 1;

# No local delivery — LMTP to Dovecot
$forward_method = 'smtp:[172.21.0.12]:10025';
$final_spam_destiny = D_PASS;
$interface_policy{'NET'} = 'AM.PDP';
$policy_bank{'AM.PDP'} = {
    originating => 1,
    os_fingerprinting => 0,
    permit_mynetworks => 1,
    allow_disclaimers => 1,
};

# Virus quarantine disabled (reject at source)
$virus_quarantine_method = 'remove';
$spam_quarantine_method  = 'remove';

# SA rules (not used as primary scanner in this stack)
$sa_mail_body_size_limit = 200000;