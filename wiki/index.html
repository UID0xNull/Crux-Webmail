<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Wiki integral de Crux-Webmail (Zero-Trust) — Documentación exhaustiva del proyecto">
  <meta name="generator" content="Crux-Webmail Wiki Kernel v1.0.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <!-- PWA-ready manifest placeholder -->
  <link rel="manifest" href="data/manifest.json" crossorigin="use-credentials">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">

  <title>Crux-Webmail — Wiki Integral</title>

  <!-- Estilos principales -->
  <link rel="stylesheet" href="css/wiki.css">

  <!-- Preload crítico -->
  <link rel="preconnect" href=".">

  <style>
    /* Inline critical CSS para evitar FOUC */
    :root { --bg: #ffffff; --text: #1a1a2e; }
    [data-theme="dark"] { --bg: #0f0f1a; --text: #e0e0e0; }
    html { background: var(--bg); color: var(--text); transition: background 0.3s, color 0.3s; }
    body { margin: 0; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
    .wiki-loader { display: flex; align-items: center; justify-content: center; height: 100vh; }
    .wiki-loader__spinner { width: 40px; height: 40px; border: 3px solid var(--text); border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Skip link accesibilidad -->
  <a href="#wiki-main-content" class="sr-only" id="skip-link">Saltar al contenido principal</a>

  <!-- ===== HEADER FIJO ===== -->
  <header id="wiki-header" class="wiki-header" role="banner">
    <div class="wiki-header__inner">
      <button
        id="sidebar-toggle"
        class="wiki-header__toggle"
        aria-label="Abrir/cerrar navegación"
        aria-expanded="false"
        aria-controls="wiki-sidebar"
        type="button"
      >
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      <a href="#/" class="wiki-header__brand" aria-label="Crux-Webmail Wiki — Inicio">
        <span class="wiki-header__logo" aria-hidden="true">🛡️</span>
        <span class="wiki-header__title">Crux-Webmail</span>
        <span class="wiki-header__subtitle">Wiki Integral</span>
      </a>

      <!-- Barra de búsqueda (sección derecha del header) -->
      <div class="wiki-header__search">
        <form id="search-form" role="search" aria-label="Buscar en la wiki">
          <input
            id="search-input"
            type="search"
            placeholder="Buscar documentación…"
            aria-label="Buscar documentación"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
          >
          <kbd class="search-kbd">⌘K</kbd>
        </form>
        <div id="search-results" class="search-results" role="listbox" hidden></div>
      </div>

      <!-- Controles del header (derecha extrema) -->
      <div class="wiki-header__controls">
        <!-- Toggle tema -->
        <button id="theme-toggle" class="wiki-header__theme-btn" aria-label="Cambiar tema" type="button">
          <svg class="icon-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" style="display:none">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>

        <!-- Botón imprimir/descargar -->
        <button id="print-btn" class="wiki-header__print-btn" aria-label="Imprimir esta página" type="button" title="Imprimir / Guardar PDF">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <polyline points="6 9 6 2 18 2 18 9"/>
            <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
            <rect x="6" y="14" width="12" height="8"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- ===== SIDEBAR NAVEGACIÓN ===== -->
  <aside id="wiki-sidebar" class="wiki-sidebar" role="navigation" aria-label="Navegación principal" hidden>
    <div class="wiki-sidebar__inner">
      <div class="wiki-sidebar__title">Navegación</div>
      <nav id="sidebar-nav"></nav>
    </div>
    <!-- Overlay en mobile -->
    <div id="sidebar-overlay" class="wiki-sidebar__overlay" hidden></div>
  </aside>

  <!-- ===== CONTENIDO PRINCIPAL ===== -->
  <main id="wiki-main" class="wiki-main" role="main">
    <div id="wiki-main-content" class="wiki-content" tabindex="-1">
      <!-- Placeholder dinámico — se rellena via JS -->
      <div id="page-content" class="page-content">
        <div class="page-content__loader" id="page-loader">
          <div class="wiki-loader__spinner" role="status" aria-label="Cargando…"></div>
        </div>
      </div>
    </div>

    <!-- Breadcrumbs -->
    <nav id="wiki-breadcrumbs" class="wiki-breadcrumbs" aria-label="Breadcrumbs" hidden>
      <ol id="breadcrumbs-list"></ol>
    </nav>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer id="wiki-footer" class="wiki-footer" role="contentinfo">
    <div class="wiki-footer__inner">
      <div class="wiki-footer__col">
        <strong>Crux-Webmail Wiki</strong>
        <span id="footer-version" class="wiki-footer__version">v1.0.0</span>
      </div>
      <div class="wiki-footer__col">
        <span id="footer-pages" class="wiki-footer__pages">0 páginas</span>
        <span id="footer-coverage" class="wiki-footer__coverage">Cobertura: --%</span>
      </div>
      <div class="wiki-footer__col">
        <a href="#/status" class="wiki-footer__link">Estado del servicio</a>
        <a href="#/changelog" class="wiki-footer__link">Cambios</a>
        <a href="#/glosario" class="wiki-footer__link">Glosario</a>
      </div>
    </div>
  </footer>

  <!-- ===== TOAST / NOTIFICACIONES ===== -->
  <div id="wiki-toasts" class="wiki-toasts" role="status" aria-live="polite"></div>

  <!-- ===== BACK TO TOP ===== -->
  <button id="back-to-top" class="wiki-backtop" aria-label="Volver arriba" hidden>
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <polyline points="18 15 12 9 6 15"/>
    </svg>
  </button>

  <!-- ===== KEYBOARD SHORTCUT HINT (TOOLTIP) ===== -->
  <div id="shortcut-hint" class="wiki-shortcut-hint" hidden>
    <span>Teclas rápidas:</span>
    <kbd>←</kbd> Atrás &nbsp; <kbd>→</kbd> Adelante &nbsp;
    <kbd>⌘K</kbd> Buscar &nbsp; <kbd>?</kbd> Ayuda
  </div>

  <!-- Script principal (defer: no bloquea render) -->
  <script src="js/wiki.js" defer></script>

  <!-- Fallback si JS falla del todo -->
  <noscript>
    <style>
      .wiki-loader{display:none !important}
      .page-content{display:block !important;opacity:1 !important}
    </style>
    <div class="noscript-msg" style="text-align:center;padding:4rem 2rem;">
      <div style="font-size:4rem;">⚠️</div>
      <h1>JavaScript requerido</h1>
      <p>La Wiki de Crux-Webmail necesita JavaScript para funcionar.</p>
      <p style="color:#6b7280;margin-top:1rem;font-size:0.85em;">
        <strong>También puedes abrir con servidor local:</strong><br>
        <code>cd wiki &amp;&amp; npx serve</code> o <code>python -m http.server 8080</code>
      </p>
    </div>
  </noscript>

  <!-- Noscript fallback -->
  <noscript>
    <style>.wiki-loader{display:none}.page-content{display:block}</style>
    <div class="page-content noscript-msg">
      <h1>⚠️ JavaScript requerido</h1>
      <p>La Wiki de Crux-Webmail necesita JavaScript para funcionar. Por favor habilita JS en tu navegador.</p>
    </div>
  </noscript>
</body>
</html>
